---
name: PR Fix

on:
  issue_comment:
    types: [created]

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != '' &&
        contains(github.event.comment.body, '/fix') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')
    steps:
      - name: Get PR info
        id: pr-info
        env:
          ISSUE_URL: ${{ github.event.comment.issue_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="$(echo "$ISSUE_URL" | grep -oP '\d+$')"
          PR_DATA="$(gh pr view "$PR_NUM" --json headRefName,headRefOid)"
          BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
          SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
          {
            echo "pr_num=$PR_NUM"
            echo "branch=$BRANCH"
            echo "sha=$SHA"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr-info.outputs.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml pre-commit

      - name: Apply workflow permissions fix
        if: >
            contains(github.event.comment.body, 'fix-workflow-permissions') ||
            contains(github.event.comment.body, 'fix all')
        run: python3 .github/scripts/fix_permissions.py

      - name: Apply pre-commit fixes
        if: >
            contains(github.event.comment.body, 'fix precommit') ||
            contains(github.event.comment.body, 'fix all')
        run: pre-commit run --all-files || true

      - name: Commit and push
        id: commit
        run: |
          if git diff --exit-code --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git commit -m "style: auto-fix PR issues"
            git push origin HEAD
            {
              echo "changed=true"
              echo "commit_sha=$(git rev-parse --short HEAD)"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment results
        if: steps.commit.outputs.changed == 'true'
        run: python3 .github/scripts/comment_fix.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIX_COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
