---
name: Lock PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Merged pull request number to lock'
        required: true
        type: string

jobs:
  lock:
    if: github.repository_owner == 'bniladridas'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Lock PR
        run: gh pr lock "${{ inputs.pr_number }}" --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
