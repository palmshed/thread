---
name: CUDA Releases

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate CUDA release creation without pushing branches, tags, or releases'
        required: false
        default: false
        type: boolean

jobs:
  cuda-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup GitHub CLI
        run: |
          gh --version

      - name: Check CUDA releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          MIN_CUDA_VERSION: '12.0.0'
        run: |
          echo "[INFO] Checking CUDA version releases..."
          ./scripts/create_cuda_releases.sh

      - name: Summary
        run: |
          echo "[PASS] CUDA release automation completed successfully!"
          echo "Check releases at: ${{ github.server_url }}/${{ github.repository }}/releases"
