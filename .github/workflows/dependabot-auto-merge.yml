---
name: Dependabot Merge

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Dependabot pull request number to enable auto-merge for'
        required: true
        type: string

jobs:
  dependabot-merge:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - name: Validate PR author
        id: pr
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_MERGE_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          author="$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')"
          if [ "$author" != "dependabot[bot]" ]; then
            echo "[ERROR] PR #$PR_NUMBER is authored by $author, not dependabot[bot]." >&2
            exit 1
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_MERGE_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash
